<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BD&A AI Advisor</title>

<style>

body{
    font-family:Arial,Helvetica,sans-serif;
    background:#f4f4f4;
    margin:0;
}

.container{
    max-width:900px;
    margin:40px auto;
    background:white;
    border-radius:10px;
    box-shadow:0 5px 20px rgba(0,0,0,.15);
    overflow:hidden;
}

.header{
    background:#1B2B4B;
    color:white;
    padding:20px;
    font-size:22px;
    font-weight:bold;
}

.chat{
    height:450px;
    overflow-y:auto;
    padding:20px;
}

.message{
    margin-bottom:15px;
    line-height:1.6;
}

.user{
    text-align:right;
}

.bot{
    text-align:left;
}

.input-area{
    display:flex;
    border-top:1px solid #ddd;
}

input{
    flex:1;
    padding:15px;
    border:none;
    font-size:16px;
}

input:focus{
    outline:none;
}

button{
    width:120px;
    background:#B8923A;
    color:white;
    border:none;
    cursor:pointer;
    font-size:16px;
}

button:hover{
    background:#98742e;
}

</style>

</head>

<body>

<div class="container">

<div class="header">
BD&A AI Advisor
</div>

<div class="chat" id="chat">

<div class="message bot">
Hello 👋<br><br>
I'm BD&A AI Advisor.<br><br>

Ask me anything related to:

<ul>
<li>GST</li>
<li>Income Tax</li>
<li>ROC</li>
<li>Audit</li>
<li>Bank Finance</li>
<li>RERA</li>
</ul>

</div>

</div>

<div class="input-area">

<input
id="question"
placeholder="Ask your question..."
>

<button id="sendBtn">

Ask

</button>

</div>

</div>

<script>

const API_KEY="AQ.Ab8RN6KXR1rr63uxCHU4OgEVPYeC8NyU3ryE72_M0rBFhHPYhw";

const MODEL="gemini-2.5-flash";

const chat=document.getElementById("chat");

const btn=document.getElementById("sendBtn");

const input=document.getElementById("question");

btn.addEventListener("click",askGemini);

input.addEventListener("keypress",(e)=>{
    if(e.key==="Enter"){
        askGemini();
    }
});

async function askGemini(){

    const question=input.value.trim();

    if(question==="") return;

    chat.innerHTML+=`
    <div class="message user">
        <b>You:</b><br>${question}
    </div>
    `;

    input.value="";

    chat.innerHTML+=`
    <div class="message bot" id="loading">
        Thinking...
    </div>
    `;

    chat.scrollTop=chat.scrollHeight;

    try{

        const response=await fetch(
        `https://generativelanguage.googleapis.com/v1beta/models/${MODEL}:generateContent?key=${API_KEY}`,
        {

            method:"POST",

            headers:{
                "Content-Type":"application/json"
            },

            body:JSON.stringify({

                contents:[
                    {
                        parts:[
                            {
                                text:question
                            }
                        ]
                    }
                ]

            })

        });

        const data=await response.json();

        document.getElementById("loading").remove();

        const answer=data.candidates[0].content.parts[0].text;

        chat.innerHTML+=`
        <div class="message bot">
            <b>BD&A AI:</b><br>${answer}
        </div>
        `;

    }
    catch(err){

        document.getElementById("loading").remove();

        chat.innerHTML+=`
        <div class="message bot">
            Error : ${err.message}
        </div>
        `;

    }

    chat.scrollTop=chat.scrollHeight;

}

</script>

</body>
</html>
